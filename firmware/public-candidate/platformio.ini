[platformio]
core_dir = ../../.tools/platformio-core
build_cache_dir = ../../.tools/platformio-cache

[env]
platform = espressif32@6.13.0
board = m5stack-core2
framework = arduino
monitor_speed = 115200
lib_ldf_mode = deep+
extra_scripts = pre:scripts/select_mp3_sources.py
build_unflags =
  -std=gnu++11
build_flags =
  -std=gnu++17
  -DCORE_DEBUG_LEVEL=0
  -DOPEN_RADIO_BUILD_LANE=\"public-candidate\"
  -DESP_A2D_AUDIO_STATE_SUSPEND=ESP_A2D_AUDIO_STATE_REMOTE_SUSPEND
  -Wl,-Map,firmware.map
  -I../common/include
  -I../generated
  -I../../renderer/include
  -I../../renderer/generated
[env:core2-public-candidate]
build_flags =
  ${env.build_flags}
  -DOPEN_RADIO_VARIANT_FULL=1
lib_deps =
  OpenRadioRenderer=symlink://../../renderer
  https://github.com/m5stack/M5Unified.git#b1ffcc677014ed8bd01e5a1f240736ae654bfe12
  M5GFX=https://github.com/m5stack/M5GFX.git#ad9b814264d4e2000e9f30070002310bbccaffc9
  https://github.com/pschatzmann/ESP32-A2DP.git#b6da4744286ca15b6f1dee607c077a4747294dd4
  https://github.com/earlephilhower/ESP8266Audio.git#d6184e08977c0f15f1b09eeee119b238ce562383

[env:core2-hardware-lab]
build_flags =
  ${env.build_flags}
  -DOPEN_RADIO_VARIANT_FULL=1
  -DOPEN_RADIO_HAS_HLS=1
  -DOPEN_RADIO_HAS_LOGO_PACK=1
  -DOPEN_RADIO_LAB_CONSOLE=1
  -I../../assets-local/station-logos
lib_deps =
  OpenRadioRenderer=symlink://../../renderer
  https://github.com/m5stack/M5Unified.git#b1ffcc677014ed8bd01e5a1f240736ae654bfe12
  M5GFX=https://github.com/m5stack/M5GFX.git#ad9b814264d4e2000e9f30070002310bbccaffc9
  https://github.com/pschatzmann/ESP32-A2DP.git#b6da4744286ca15b6f1dee607c077a4747294dd4
  https://github.com/earlephilhower/ESP8266Audio.git#d6184e08977c0f15f1b09eeee119b238ce562383

[env:core2-owner-production]
build_flags =
  ${env.build_flags}
  -DOPEN_RADIO_VARIANT_FULL=1
  -DOPEN_RADIO_HAS_LOGO_PACK=1
  -I../../assets-local/station-logos
lib_deps =
  OpenRadioRenderer=symlink://../../renderer
  https://github.com/m5stack/M5Unified.git#b1ffcc677014ed8bd01e5a1f240736ae654bfe12
  M5GFX=https://github.com/m5stack/M5GFX.git#ad9b814264d4e2000e9f30070002310bbccaffc9
  https://github.com/pschatzmann/ESP32-A2DP.git#b6da4744286ca15b6f1dee607c077a4747294dd4
  https://github.com/earlephilhower/ESP8266Audio.git#d6184e08977c0f15f1b09eeee119b238ce562383

[env:core2-onboarding-only]
build_flags =
  ${env.build_flags}
  -DOPEN_RADIO_VARIANT_ONBOARDING_ONLY=1
lib_deps =
  OpenRadioRenderer=symlink://../../renderer
  https://github.com/m5stack/M5Unified.git#b1ffcc677014ed8bd01e5a1f240736ae654bfe12
  M5GFX=https://github.com/m5stack/M5GFX.git#ad9b814264d4e2000e9f30070002310bbccaffc9

[env:core2-local-speaker-fallback]
build_flags =
  ${env.build_flags}
  -DOPEN_RADIO_VARIANT_LOCAL_SPEAKER=1
lib_deps =
  OpenRadioRenderer=symlink://../../renderer
  https://github.com/m5stack/M5Unified.git#b1ffcc677014ed8bd01e5a1f240736ae654bfe12
  M5GFX=https://github.com/m5stack/M5GFX.git#ad9b814264d4e2000e9f30070002310bbccaffc9
  https://github.com/earlephilhower/ESP8266Audio.git#d6184e08977c0f15f1b09eeee119b238ce562383

[env:core2-bt-disabled-diagnostics]
build_flags =
  ${env.build_flags}
  -DOPEN_RADIO_VARIANT_BT_DISABLED_DIAGNOSTICS=1
lib_deps =
  OpenRadioRenderer=symlink://../../renderer
  https://github.com/m5stack/M5Unified.git#b1ffcc677014ed8bd01e5a1f240736ae654bfe12
  M5GFX=https://github.com/m5stack/M5GFX.git#ad9b814264d4e2000e9f30070002310bbccaffc9

[env:core2-corrupt-config-safe-mode]
build_flags =
  ${env.build_flags}
  -DOPEN_RADIO_VARIANT_CORRUPT_SAFE_MODE=1
lib_deps =
  OpenRadioRenderer=symlink://../../renderer
  https://github.com/m5stack/M5Unified.git#b1ffcc677014ed8bd01e5a1f240736ae654bfe12
  M5GFX=https://github.com/m5stack/M5GFX.git#ad9b814264d4e2000e9f30070002310bbccaffc9
